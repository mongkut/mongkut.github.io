  // Dim others, highlight this
  bgLines.forEach((l,i)=>{
    if(i===idx) l.setStyle({weight:0,opacity:0});
    else l.setStyle({weight:2,opacity:0.12});
  });

  // Active line
  activeLine=L.polyline(r.coords,{color:palette[idx%palette.length],weight:5,opacity:0.9}).addTo(mp);

  // Key stop markers (important landmarks only)
  r.key_stop_latlons.forEach((ks,ki)=>{
    const m=L.circleMarker([ks.lat,ks.lon],{
      radius:6,color:'#c0392b',fillColor:'#e74c3c',
      fillOpacity:0.9,weight:2
    }).addTo(mp);
    m.bindTooltip(`${ki+1}. ${ks.name}`,{permanent:false,direction:'right',offset:[8,0]});
    markers.push(m);
  });
  // Start/end terminals
  if(r.coords.length>=2){
    const s=L.circleMarker(r.coords[0],{radius:9,color:'#27ae60',fillColor:'#2ecc71',fillOpacity:1,weight:2}).addTo(mp).bindTooltip(r.from_sz+' center');
    const e=L.circleMarker(r.coords[r.coords.length-1],{radius:9,color:'#8e44ad',fillColor:'#9b59b6',fillOpacity:1,weight:2}).addTo(mp).bindTooltip(r.to_sz+' center');
    markers.push(s,e);
  }

  mp.fitBounds(activeLine.getBounds().pad(0.08));

}

function renderTable(){
  const tb=document.getElementById('tb');
  tb.innerHTML='';
  ft.forEach((r,i)=>{
    const tr=document.createElement('tr');
    if(r.rank===sel) tr.classList.add('selected');
    const bw=Math.max(2,Math.round(r.demand/mx*140));
    tr.innerHTML=
      `<td class="r">${r.rank}</td>`+
      `<td style="font-weight:bold">${r.label}</td>`+
      `<td class="r"><span class="bar" style="width:${bw}px"></span> ${r.demand.toLocaleString()}</td>`+
      `<td class="r">${r.travel_min}m</td>`+
      `<td class="r">${r.length_km}</td>`+
      `<td style="font-size:11px;color:#666">${r.zones}</td>`;
    const idx=R.findIndex(x=>x.rank===r.rank);
    tr.onclick=()=>showRoute(r,idx);
    tb.appendChild(tr);
    // Show chain row under selected route
    if(r.rank===sel){
      const cr=document.createElement('tr');
      cr.innerHTML=`<td colspan="6" class="chain-row"><b>สาย ${r.rank}</b>&nbsp;&nbsp;${r.key_stops.join(' <span class="arrow">--></span> ')}</td>`;
      tb.appendChild(cr);
    }
  });
}

function sb(k){
  if(sk===k) sa=!sa;
  else { sk=k; sa=['rank','label','zones'].includes(k); }
  ft.sort((a,b)=>{
    let va=a[k],vb=b[k];
    if(typeof va==='string') return sa?va.localeCompare(vb):vb.localeCompare(va);
    return sa?va-vb:vb-va;
  });
  renderTable();
}

renderTable();
</script>
