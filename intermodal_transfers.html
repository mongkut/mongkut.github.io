const pCnt={};D.a.forEach(a=>{pCnt[a.p]=(pCnt[a.p]||0)+1});
const ps=Object.keys(pCnt).sort((a,b)=>pCnt[b]-pCnt[a]);
const pv={};ps.forEach(p=>pv[p]=true);

const lg=document.getElementById('lg');
ps.forEach(p=>{
  const d=document.createElement('div');
  d.innerHTML=`<input type="checkbox" checked data-p="${p}">
    <span style="background:${pc(p)}"></span> ${p} (${pCnt[p]})`;
  d.querySelector('input').onchange=e=>{pv[p]=e.target.checked;render()};
  lg.appendChild(d);
});

let al=[],sl=[];
function render(){
  al.forEach(l=>mp.removeLayer(l));sl.forEach(l=>mp.removeLayer(l));al=[];sl=[];
  const tb=document.getElementById('tb');tb.innerHTML='';let n=0;
  D.a.forEach(a=>{
    if(!pv[a.p])return;
    const ln=L.polyline([a.f,a.t],{color:pc(a.p),weight:3,opacity:0.7});
    ln.bindPopup(`<b>${a.fm}</b> ${a.fn}<br>↔ <b>${a.tm}</b> ${a.tn}<br>${a.s}s`);
    ln.addTo(mp);al.push(ln);
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${a.fn||a.fm}</td><td>${a.tn||a.tm}</td>
      <td style="color:${pc(a.p)}">${a.p}</td><td>${a.s}s</td>`;
    tr.onclick=()=>{mp.setView([(a.f[0]+a.t[0])/2,(a.f[1]+a.t[1])/2],15);ln.openPopup()};
    tb.appendChild(tr);n++;
  });
  D.s.forEach(s=>{
    const m=L.circleMarker(s.l,{radius:5,color:MC[s.m]||'#999',fillColor:MC[s.m]||'#999',fillOpacity:0.8});

  });
  document.getElementById('st').textContent=`${n} / ${D.a.length} transfer arcs shown`;
}
